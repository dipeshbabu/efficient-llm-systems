name: Publish refract-llm to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact refract-llm version to publish (for example, 0.3.4)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-refract-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify refract-llm
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Validate release tag and package version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          expected_tag="refract-v${REQUESTED_VERSION}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Run this workflow from the release tag, not a branch."
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Expected tag ${expected_tag}; got ${GITHUB_REF_NAME}."
            exit 1
          fi

          actual_version="$(
            python - <<'PY'
          from pathlib import Path
          import tomllib

          manifest = Path("components/refract/pyproject.toml")
          with manifest.open("rb") as stream:
              print(tomllib.load(stream)["project"]["version"])
          PY
          )"
          if [[ "${actual_version}" != "${REQUESTED_VERSION}" ]]; then
            echo "Manifest version ${actual_version} does not match ${REQUESTED_VERSION}."
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Release tag must point to a commit reachable from main."
            exit 1
          fi

      - name: Sync locked workspace
        run: uv sync --locked --all-packages

      - name: Test refract-llm
        run: uv run --locked pytest components/refract/tests -v --tb=short

      - name: Build distribution
        run: uv run --locked python -m build --outdir dist/refract components/refract

      - name: Verify distribution
        shell: bash
        run: |
          uv run --locked python -m twine check dist/refract/*
          uv run --locked python tools/maintenance/check_wheel_contents.py \
            dist/refract/*.whl

      - name: Store verified distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: refract-llm-${{ inputs.version }}
          path: dist/refract/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish refract-llm ${{ inputs.version }}
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/refract-llm
    permissions:
      id-token: write

    steps:
      - name: Download verified distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: refract-llm-${{ inputs.version }}
          path: dist/

      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist/
          verify-metadata: true
          attestations: true
