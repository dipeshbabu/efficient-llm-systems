name: Publish turboquant-reference to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact turboquant-reference version to publish (for example, 0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-turboquant-reference-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify turboquant-reference
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Validate release tag, package version, and changelog
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          expected_tag="turboquant-reference-v${REQUESTED_VERSION}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Run this workflow from the release tag, not a branch."
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Expected tag ${expected_tag}; got ${GITHUB_REF_NAME}."
            exit 1
          fi

          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          requested = os.environ["REQUESTED_VERSION"]
          manifest = Path("components/turboquant-reference/pyproject.toml")
          with manifest.open("rb") as stream:
              actual = tomllib.load(stream)["project"]["version"]
          if actual != requested:
              raise SystemExit(
                  f"Manifest version {actual} does not match {requested}."
              )

          changelog = Path(
              "components/turboquant-reference/CHANGELOG.md"
          ).read_text(encoding="utf-8")
          pattern = rf"^## \[{re.escape(requested)}\] - \d{{4}}-\d{{2}}-\d{{2}}$"
          if re.search(pattern, changelog, flags=re.MULTILINE) is None:
              raise SystemExit(
                  "Changelog needs a dated release heading for " + requested
              )
          PY

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Release tag must point to a commit reachable from main."
            exit 1
          fi

      - name: Sync locked workspace
        run: uv sync --locked --all-packages

      - name: Test turboquant-reference
        run: >-
          uv run --locked pytest components/turboquant-reference/tests
          -v --tb=short

      - name: Build distribution
        run: >-
          uv run --locked python -m build
          --outdir dist/turboquant-reference
          components/turboquant-reference

      - name: Verify distribution and clean-wheel behavior
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          uv run --locked python -m twine check dist/turboquant-reference/*
          uv run --locked python tools/maintenance/check_wheel_contents.py \
            dist/turboquant-reference/*.whl
          sha256sum dist/turboquant-reference/*

          uv venv --clear .release-smoke-venv
          uv pip install \
            --python .release-smoke-venv/bin/python \
            --force-reinstall \
            dist/turboquant-reference/*.whl
          .release-smoke-venv/bin/python - <<'PY'
          import os
          from importlib.metadata import version

          import numpy as np
          from turboquant import TurboQuant

          assert version("turboquant-reference") == os.environ["REQUESTED_VERSION"]
          quantizer = TurboQuant(d=128, bit_width=3, seed=42)
          original = np.linspace(-1.0, 1.0, 128)
          restored = quantizer.dequantize(quantizer.quantize(original))
          assert restored.shape == original.shape
          assert np.isfinite(restored).all()
          PY
          .release-smoke-venv/bin/python \
            components/turboquant-reference/benchmarks/examples/demo.py

      - name: Store verified distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: turboquant-reference-${{ inputs.version }}
          path: dist/turboquant-reference/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish turboquant-reference ${{ inputs.version }}
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi-turboquant-reference
      url: https://pypi.org/p/turboquant-reference
    permissions:
      id-token: write

    steps:
      - name: Download verified distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: turboquant-reference-${{ inputs.version }}
          path: dist/

      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          verify-metadata: true
          attestations: true

  release:
    name: Create GitHub release for turboquant-reference ${{ inputs.version }}
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download published distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: turboquant-reference-${{ inputs.version }}
          path: dist/

      - name: Create release with verified artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "turboquant-reference ${REQUESTED_VERSION}" \
            --generate-notes
