name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: >-
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ hashFiles('components/*/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install components
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "components/turboquant-reference[dev]"
          python -m pip install -e "components/refract[dev]"

      - name: Run TurboQuant reference tests
        run: >-
          python -m pytest components/turboquant-reference/tests
          -v --tb=short

      - name: Run REFRACT tests
        run: python -m pytest components/refract/tests -v --tb=short

      - name: Check local documentation links
        run: python tools/maintenance/check_markdown_links.py

  package:
    name: Build and inspect distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build components
        run: |
          python -m build --outdir dist/refract components/refract
          python -m build --outdir dist/turboquant components/turboquant-reference

      - name: Check metadata and wheel contents
        run: |
          python -m twine check dist/refract/* dist/turboquant/*
          python tools/maintenance/check_wheel_contents.py dist/refract/*.whl dist/turboquant/*.whl

      - name: Install built wheels and smoke-test imports
        run: |
          python -m pip install --force-reinstall dist/refract/*.whl dist/turboquant/*.whl
          refract --help
          python -c "import refract, turboquant; print(refract.__version__)"
