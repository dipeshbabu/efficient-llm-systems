# Repository-level tool configuration.
#
# Efficient LLM Systems is a monorepo, not a publishable root distribution.
# Each component owns its package manifest and release lifecycle.

[dependency-groups]
dev = [
    "build>=1.0",
    "coverage>=7.0",
    "mypy==2.3.0",
    "pre-commit>=4.6.0",
    "pytest>=9.0.3",
    "pytest-cov>=4.0",
    "ruff>=0.15.0",
    "twine>=5.0",
    "types-requests>=2.28",
]

[tool.uv]
required-version = ">=0.11.8"

[tool.uv.workspace]
members = [
    "components/refract",
    "components/turboquant-reference",
]

[tool.ruff]
target-version = "py310"
line-length = 88
src = [
    "components/refract/src",
    "components/turboquant-reference/src",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP"]
ignore = [
    # Line wrapping is delegated to the formatter.
    "E501",
    # Keep Optional[T] stable for runtime annotation consumers.
    "UP045",
]

[tool.ruff.lint.per-file-ignores]
# Package initializers may intentionally expose imports as public API.
"**/__init__.py" = ["F401"]

[tool.mypy]
files = [
    "components/refract/src/refract",
    "components/turboquant-reference/src/turboquant",
    "tools",
]
python_version = "3.10"
check_untyped_defs = true
explicit_package_bases = true
ignore_missing_imports = false
incremental = false
show_error_codes = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
# Optional engine stacks are intentionally absent from the default workspace.
module = [
    "mlx",
    "mlx.*",
    "mlx_lm",
    "mlx_lm.*",
    "scipy",
    "scipy.*",
    "torch",
    "torch.*",
    "transformers",
    "transformers.*",
    "vllm",
    "vllm.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = [
    "components/turboquant-reference/tests",
    "components/refract/tests",
]
pythonpath = [
    "components/turboquant-reference/src",
    "components/refract/src",
]
markers = [
    "integration: requires external engines, models, or corpora",
]

[tool.coverage.run]
branch = true
source = ["turboquant", "refract"]

[tool.coverage.report]
# The authoritative Ubuntu coverage job currently reports about 86.5% branch
# coverage, including platform-specific backend modules. Keep that baseline
# from regressing while reporting the gate at the same precision.
fail_under = 86
precision = 2
show_missing = true
skip_covered = true
