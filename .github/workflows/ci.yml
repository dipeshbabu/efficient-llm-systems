name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Python style and documentation
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Sync workspace
        run: uv sync --locked --all-packages

      - name: Run pre-commit checks
        shell: bash
        run: |
          uv_bin_dir="$(dirname "$(command -v uv)")"
          export PATH="${uv_bin_dir}:${PATH}"
          uv run --locked pre-commit run --all-files --show-diff-on-failure

  test:
    name: Tests / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.10"
            expected_platform: Linux
            expected_environment: linux
            expected_status: supported
          - os: ubuntu-24.04
            python-version: "3.11"
            expected_platform: Linux
            expected_environment: linux
            expected_status: supported
          - os: ubuntu-24.04
            python-version: "3.12"
            expected_platform: Linux
            expected_environment: linux
            expected_status: supported
          - os: windows-2025
            python-version: "3.13"
            expected_platform: Windows
            expected_environment: windows-native
            expected_status: unsupported
          - os: macos-15
            python-version: "3.13"
            expected_platform: Darwin
            expected_environment: macos-apple-silicon
            expected_status: supported

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Sync workspace
        run: uv sync --locked --all-packages

      - name: Inspect diagnostic platform contract
        run: >-
          uv run python -c "import json, subprocess, sys;
          contract = json.loads(subprocess.check_output(
          [sys.executable, 'tools/diagnostics/turbo_hardware_diag.py',
          '--platform-support'], text=True));
          expected = {'platform': '${{ matrix.expected_platform }}',
          'environment': '${{ matrix.expected_environment }}',
          'status': '${{ matrix.expected_status }}'};
          print(json.dumps(contract, indent=2));
          mismatches = {key: {'expected': value, 'actual': contract.get(key)}
          for key, value in expected.items() if contract.get(key) != value};
          assert not mismatches, mismatches"

      - name: Run TurboQuant reference tests
        run: >-
          uv run pytest components/turboquant-reference/tests
          -v --tb=short

      - name: Run REFRACT tests
        run: uv run pytest components/refract/tests -v --tb=short

  coverage:
    name: Coverage / Ubuntu / Python 3.13
    runs-on: ubuntu-24.04
    env:
      UV_PYTHON: "3.13"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Sync workspace
        run: uv sync --locked --all-packages

      - name: Run tests with branch coverage
        run: >-
          uv run pytest
          components/turboquant-reference/tests
          components/refract/tests
          --cov=turboquant
          --cov=refract
          --cov-report=term-missing
          -v --tb=short

  package:
    name: Build and inspect distributions
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Sync workspace
        run: uv sync --locked --all-packages

      - name: Build components
        run: |
          uv run python -m build --outdir dist/refract components/refract
          uv run python -m build --outdir dist/turboquant components/turboquant-reference

      - name: Check metadata and wheel contents
        run: |
          uv run python -m twine check dist/refract/* dist/turboquant/*
          uv run python tools/maintenance/check_wheel_contents.py dist/refract/*.whl dist/turboquant/*.whl

      - name: Install built wheels and smoke-test imports
        run: |
          uv venv --clear .smoke-venv
          uv pip install --python .smoke-venv/bin/python --force-reinstall dist/refract/*.whl dist/turboquant/*.whl
          .smoke-venv/bin/refract --help
          .smoke-venv/bin/python -c "import refract, turboquant; print(refract.__version__)"
          .smoke-venv/bin/python components/turboquant-reference/benchmarks/examples/demo.py
          .smoke-venv/bin/python tools/diagnostics/turbo_hardware_diag.py --help

  ci-required:
    name: CI required
    if: ${{ always() }}
    needs:
      - lint
      - test
      - coverage
      - package
    runs-on: ubuntu-24.04

    steps:
      - name: Verify required jobs succeeded
        shell: bash
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          PACKAGE_RESULT: ${{ needs.package.result }}
        run: |
          for result in \
            "lint=${LINT_RESULT}" \
            "test=${TEST_RESULT}" \
            "coverage=${COVERAGE_RESULT}" \
            "package=${PACKAGE_RESULT}"
          do
            if [[ "${result#*=}" != "success" ]]; then
              echo "Required job did not succeed: ${result}"
              exit 1
            fi
          done
